services:
  app-db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WEBID_DB_NAME}
      MYSQL_USER: ${WEBID_DB_USER}
      MYSQL_PASSWORD: ${WEBID_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WEBID_DB_ROOT_PASSWORD}
    command:
      - --transaction-isolation=READ-COMMITTED
      - --binlog-format=ROW
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - app-db-data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u${WEBID_DB_USER}", "-p${WEBID_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import:ro

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    restart: unless-stopped
    depends_on:
      - keycloak
    command: ["--config=/etc/oauth2-proxy/oauth2-proxy.cfg"]
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_REDIRECT_URL: ${OAUTH2_PROXY_REDIRECT_URL}
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OAUTH2_PROXY_OIDC_ISSUER_URL}
    ports:
      - "${OAUTH2_PROXY_HTTP_PORT}:4180"
    volumes:
      - ./oauth2-proxy/oauth2-proxy.cfg.example:/etc/oauth2-proxy/oauth2-proxy.cfg:ro

  webid:
    image: ${WEBID_IMAGE}
    restart: unless-stopped
    depends_on:
      app-db:
        condition: service_healthy
    environment:
      WEBID_EXTERNAL_BASE_URL: ${WEBID_EXTERNAL_BASE_URL}
      WEBID_TRUSTED_PROXY_CIDRS: ${WEBID_TRUSTED_PROXY_CIDRS}
      WEBID_OIDC_PROXY_AUTH: ${WEBID_OIDC_PROXY_AUTH}
      WEBID_OIDC_EMAIL_HEADER: ${WEBID_OIDC_EMAIL_HEADER}
      WEBID_OIDC_USER_HEADER: ${WEBID_OIDC_USER_HEADER}
      WEBID_OIDC_NAME_HEADER: ${WEBID_OIDC_NAME_HEADER}
      WEBID_OIDC_ROLES_HEADER: ${WEBID_OIDC_ROLES_HEADER}
      WEBID_DISABLE_LOCAL_LOGIN: ${WEBID_DISABLE_LOCAL_LOGIN}
      WEBID_DISABLE_PUBLIC_REGISTRATION: ${WEBID_DISABLE_PUBLIC_REGISTRATION}
      WEBID_ADMIN_ROLE: ${WEBID_ADMIN_ROLE}
      WEBID_APPROVER_ROLE: ${WEBID_APPROVER_ROLE}
      WEBID_BIDDER_ROLE: ${WEBID_BIDDER_ROLE}
      WEBID_DB_HOST: app-db
      WEBID_DB_NAME: ${WEBID_DB_NAME}
      WEBID_DB_USER: ${WEBID_DB_USER}
      WEBID_DB_PASSWORD: ${WEBID_DB_PASSWORD}
    volumes:
      - webid-uploads:/var/www/html/uploads
      - ./docker/webid/overrides:/opt/webid-overrides:ro
    ports:
      - "${WEBID_HTTP_PORT}:80"

volumes:
  app-db-data:
  keycloak-db-data:
  keycloak-data:
  webid-uploads:
